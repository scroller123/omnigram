version: '3.8'

services:
  omnigram_api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8080
      - DB_HOST=omnigram_postgres
      - OLLAMA_URL=http://omnigram_ollama:11434
    depends_on:
      - db
      - ollama
    networks:
      - omnigram_network

  nginx:
    build:
      context: ./mini-app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./mini-app/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - omnigram_network
    depends_on:
      - omnigram_api

  db:
    image: pgvector/pgvector:pg15
    container_name: omnigram_postgres
    env_file:
      - .env
    ports:
      - "35533:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - omnigram_network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.18.0
    container_name: omnigram_ollama
    environment:
      OLLAMA_VULKAN: 1
      OLLAMA_NUM_PARALLEL: 4
      OLLAMA_CONTEXT_LENGTH: 1024
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_DEBUG: 1
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/Modelfile:/modelfiles/Modelfile:ro
      - ./ollama/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - omnigram_network
    restart: unless-stopped

networks:
  omnigram_network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
